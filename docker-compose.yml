services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-brawlally}
      POSTGRES_USER: ${POSTGRES_USER:-brawlally}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD est requis}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-brawlally} -d ${POSTGRES_DB:-brawlally}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-brawlally}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-brawlally}
      NODE_ENV: production
      PORT: 8080
      STATIC_DIR: /app/public
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
